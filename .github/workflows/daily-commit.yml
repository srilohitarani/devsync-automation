name: Daily Automated Commit

on:
  schedule:
    - cron: '30 2 * * *'   # Runs every day at 02:30 UTC
  workflow_dispatch:         # Also allows manual triggering

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: This step is named with your email as required
      - name: Commit update for 23f1002691@ds.study.iitm.ac.in
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "23f1002691@ds.study.iitm.ac.in"
          echo "Automated update: $(date)" >> activity_log.txt
          git add activity_log.txt
          git commit -m "Daily automated commit - $(date '+%Y-%m-%d %H:%M:%S')"
          git push
